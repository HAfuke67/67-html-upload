<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>忘本记录查询</title>
  <script src=https://unpkg.zhimg.com/@supabase/supabase-js@2.42.7/dist/umd/supabase.min.js></script>
  <style>
    body{
      background:linear-gradient(#ff00b0,#0067ff);
      height:100vh; 
      margin:0;
    }
    .shuru{
      background-color:#ffffff;
      border-color:#000000; 
      border-width:1px;
      display:block; 
      margin:79px auto 0;
      border-radius:5px;
      padding:6px 10px;
      width:260px;
    }
    .zi1{
      color:#0086ff;
      text-align:center; 
      font-size:42px;
      margin-top:50px;
    }
    .zi2{
      color:#ffffff;
      text-align:center; 
      font-size:14px;
      margin:6px 10px;
    }
    .cha{
      background:linear-gradient(45deg,#ffad00,#ff00ed);
      border:none;
      height:36px; 
      width:90px;
      display:block; 
      margin:40px auto 0;
      border-radius:6px;
      color:white;
      font-size:16px;
    }
  </style>
</head>
<body>
  <div class="zi1"><b><i>忘本莉莉记录查询</i></b></div>
  <div class="zi2">输入id按下按钮即可查询🤓，目前数据库仍在更新中</div>
  <div class="zi2">数据库只写不删，即永久记录，忘本的人你们有福了😂</div>
  <div class="zi2">如果查到忘本的话可以让他亲吻大地🤓☝️</div>
  <div class="zi2">主播主播莉莉带伞咋办？那就给他撇虚空里或玩之前就给他踢了😡</div>

  <input type="text" class="shuru" id="inputId" placeholder="输入ID">
  <button class="cha" onclick="searchData()">查询</button>

  <script>
    const SUPABASE_URL = "https://wshtjosulvxukiwznqsg.supabase.co";
    const SUPABASE_KEY = "sb_publishable_cmf2wj-SHpcolDn5YJRSPA_yisINM6w";
    let supabase;
   
    window.onload = function(){
      if(window.supabase){
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      }else{
        alert("Supabase数据库加载失败！网络问题，请刷新页面");
      }
    }

    async function searchData(){
      if(!supabase){
        alert("数据库组件未加载完成，请等待几秒再点查询！");
        return;
      }
      const inputDom = document.getElementById("inputId");
      const inputVal = inputDom.value.trim();
      if(!inputVal){
        alert("请输入ID再查询！");
        return;
      }
      try{
        const {data,error} = await supabase.from("allow_ids").select("*").eq("target_id",inputVal);
        if(error){
          alert("查询出错："+error.message);
          return;
        }
        if(data.length>0){
          alert("注意！此ID有忘本记录");
        }else{
          alert("此ID未录入数据库，但不能放松警惕");
        }
      }catch(err){
        alert("网络请求失败：" + err.message);
      }
    }
  </script>
</body>
</html>
